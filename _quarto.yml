project:
  type: website
  output-dir: _site

website:
  title: jaxCAD
  description: Differentiable CAD with JAX and SDFs
  navbar:
    left:
      - text: Get Started
        href: docs/getting-started.qmd
      - text: Examples
        menu:
          - text: Basics
            href: examples/basics.ipynb
          - text: Constraints
            href: examples/constraints.ipynb
          - text: Optimization
            href: examples/optimization.ipynb
          - text: Constrained Optimization
            href: examples/constrained_optimization.ipynb
      - text: API Reference
        href: reference/index.qmd
    right:
      - icon: github
        href: https://github.com/andrinr/jaxcad

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true

execute:
  enabled: false  # render stored outputs, don't re-execute

quartodoc:
  package: jaxcad
  dir: reference
  parser: google
  sections:
    - title: Parameter Extraction
      contents:
        - extraction.extract_parameters
        - extraction.extract_parameters_with_constraints
    - title: Functionalize
      contents:
        - functionalize.functionalize
    - title: Constraints — types
      contents:
        - constraints.base.Constraint
        - constraints.types.distance.DistanceConstraint
        - constraints.types.angle.AngleConstraint
        - constraints.types.parallel.ParallelConstraint
        - constraints.types.perpendicular.PerpendicularConstraint
    - title: Constraints — DOF
      contents:
        - constraints.dof.extract_free_dof
        - constraints.dof.linearize_at
        - constraints.dof.in_null_space
        - constraints.dof.null_space_update
        - constraints.dof.projected_update
        - constraints.dof.project_gradient
        - constraints.dof.project_to_manifold
        - constraints.dof.project_to_full
        - constraints.dof.project_to_reduced
        - constraints.dof.total_dof_reduction
        - constraints.dof.all_parameters
    - title: Constraints — solver
      contents:
        - constraints.solve.solve_constraints
    - title: Construction
      contents:
        - construction.from_point.from_point
        - construction.from_line.from_line
        - construction.from_circle.from_circle
        - construction.extrude.extrude
    - title: Geometry
      contents:
        - geometry.parameters.Vector
        - geometry.parameters.Scalar
    - title: Render
      contents:
        - render.render_marching_cubes
